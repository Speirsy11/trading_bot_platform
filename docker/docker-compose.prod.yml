services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: tb-api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://trading_bot:changeme@postgres:5432/trading_bot_dev
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  workers:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: tb-workers
    command: ["node", "--import", "tsx/esm", "src/workers/index.ts"]
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://trading_bot:changeme@postgres:5432/trading_bot_dev
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure:5
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: tb-web
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: tb-postgres
    environment:
      POSTGRES_USER: trading_bot
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: trading_bot_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tb-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  worker_exports:
